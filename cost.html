<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>產品成本查詢</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif; background: #f5f5f5; min-height: 100vh; }

#login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
.login-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 16px; padding: 2.5rem 2rem; width: 100%; max-width: 360px; box-shadow: 0 2px 16px rgba(0,0,0,0.06); }
.login-logo { width: 80px; height: 80px; border-radius: 50%; overflow: hidden; margin: 0 auto 1.25rem; }
.login-title { font-size: 20px; font-weight: 600; color: #111; text-align: center; margin-bottom: 4px; }
.login-sub { font-size: 13px; color: #888; text-align: center; margin-bottom: 1.75rem; }
.field-label { font-size: 12px; color: #666; margin-bottom: 5px; }
.field-wrap { margin-bottom: 12px; }
.field-wrap input { width: 100%; padding: 10px 14px; font-size: 14px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #111; outline: none; transition: border-color 0.15s; }
.field-wrap input:focus { border-color: #111; }
.btn-primary { width: 100%; padding: 11px; font-size: 14px; font-weight: 600; background: #111; color: #fff; border: none; border-radius: 8px; cursor: pointer; margin-top: 4px; transition: opacity 0.15s; }
.btn-primary:hover { opacity: 0.82; }
.btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
.err-box { background: #fff2f2; border: 1px solid #fcc; border-radius: 8px; padding: 9px 12px; font-size: 13px; color: #c00; margin-top: 10px; display: none; }

#app-screen { display: none; max-width: 640px; margin: 0 auto; padding: 1.5rem 1rem 2rem; }
.app-header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 1rem; border-bottom: 1px solid #e0e0e0; margin-bottom: 1.25rem; }
.user-pill { display: flex; align-items: center; gap: 8px; }
.user-avatar { width: 32px; height: 32px; border-radius: 50%; background: #f0f0f0; border: 1px solid #e0e0e0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: #555; }
.user-name { font-size: 14px; font-weight: 600; color: #111; }
.user-account { font-size: 11px; color: #999; }
.btn-logout { font-size: 12px; color: #888; background: none; border: 1px solid #ddd; border-radius: 8px; padding: 5px 12px; cursor: pointer; }
.btn-logout:hover { border-color: #aaa; }

.tab-row { display: flex; border-bottom: 1px solid #e0e0e0; margin-bottom: 1.25rem; }
.tab-btn { padding: 8px 20px; font-size: 13px; color: #999; background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; margin-bottom: -1px; transition: color 0.15s; }
.tab-btn:hover { color: #111; }
.tab-btn.active { color: #111; font-weight: 600; border-bottom-color: #111; }

.notice-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; overflow: hidden; margin-bottom: 10px; }
.notice-header { display: flex; align-items: flex-start; justify-content: space-between; padding: 14px 16px 12px; border-bottom: 1px solid #f0f0f0; }
.notice-dot { width: 7px; height: 7px; border-radius: 50%; background: #2563eb; margin-top: 5px; margin-right: 8px; flex-shrink: 0; }
.notice-title { font-size: 14px; font-weight: 600; color: #111; flex: 1; }
.notice-date { font-size: 11px; color: #bbb; white-space: nowrap; margin-left: 12px; margin-top: 2px; }
.notice-body { padding: 12px 16px; font-size: 13px; color: #555; line-height: 1.7; white-space: pre-wrap; }
.notice-empty { text-align: center; padding: 3rem 1rem; font-size: 13px; color: #bbb; }

.search-row { display: flex; gap: 8px; margin-bottom: 1rem; }
.search-row input { flex: 1; padding: 10px 14px; font-size: 14px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #111; outline: none; }
.search-row input:focus { border-color: #111; }
.btn-search { padding: 10px 20px; font-size: 14px; font-weight: 600; background: #111; color: #fff; border: none; border-radius: 8px; cursor: pointer; white-space: nowrap; }
.btn-search:hover { opacity: 0.82; }
.btn-search:disabled { opacity: 0.35; cursor: not-allowed; }

.status-msg { text-align: center; padding: 2.5rem 1rem; font-size: 13px; color: #999; }
.result-count { font-size: 12px; color: #999; margin-bottom: 10px; }
.result-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 12px 16px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
.result-name { font-size: 14px; font-weight: 600; color: #111; }
.result-id { font-size: 11px; color: #bbb; font-family: monospace; margin-top: 3px; }
.result-cost { font-size: 18px; font-weight: 700; color: #111; text-align: right; }

@keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }
.dots span { display: inline-block; animation: blink 1.2s infinite; }
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
</style>

    <div class="login-title">產品成本查詢</div>
    <div class="login-sub">請輸入帳號與密碼</div>
    <div class="field-wrap">
      <div class="field-label">帳號</div>
      <input type="text" id="inp-user" placeholder="sales01" autocomplete="username" />
    </div>
    <div class="field-wrap">
      <div class="field-label">密碼</div>
      <input type="password" id="inp-pw" placeholder="••••••" autocomplete="current-password" />
    </div>
    <button class="btn-primary" id="btn-login" onclick="doLogin()">登入</button>
    <div class="err-box" id="err-box"></div>
  </div>
</div>

<div id="app-screen">
  <div class="app-header">
    <div class="user-pill">
      <div class="user-avatar" id="user-avatar"></div>
      <div>
        <div class="user-name" id="user-name-display"></div>
        <div class="user-account" id="user-account-display"></div>
      </div>
    </div>
    <button class="btn-logout" onclick="doLogout()">登出</button>
  </div>
  <div class="tab-row">
    <button class="tab-btn active" id="t-notice" onclick="switchTab('notice')">公布欄</button>
    <button class="tab-btn" id="t-search" onclick="switchTab('search')">成本查詢</button>
  </div>
  <div id="tab-notice">
    <div id="notice-area">
      <div class="status-msg">載入公告中 <span class="dots"><span>．</span><span>．</span><span>．</span></span></div>
    </div>
  </div>
  <div id="tab-search">
    <div class="search-row">
      <input type="text" id="search-input" placeholder="搜尋編號或品名…" />
      <button class="btn-search" id="btn-search" onclick="doSearch()">搜尋</button>
    </div>
    <div id="results-area">
      <div class="status-msg">輸入關鍵字後點擊搜尋</div>
    </div>
  </div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbws4CtL_0fHfNLNINGyyD5hx5moWLMbH2_3B7RGi2VqIEwaVSeXa15zG6njrphUUjIz/exec';
let currentUser = null;
let noticeLoaded = false;

async function api(params) {
  const url = API + '?' + new URLSearchParams(params).toString();
  const res = await fetch(url);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

async function doLogin() {
  const username = document.getElementById('inp-user').value.trim();
  const password = document.getElementById('inp-pw').value;
  const err = document.getElementById('err-box');
  const btn = document.getElementById('btn-login');
  err.style.display = 'none';
  if (!username || !password) { err.textContent = '請填寫帳號和密碼'; err.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = '驗證中…';
  try {
    const ua = navigator.userAgent;
    const data = await api({ action: 'login', username, password, ua });
    if (data.success) {
      currentUser = { username, name: data.name };
      showApp();
    } else {
      err.textContent = data.reason || '帳號或密碼錯誤，請再試一次';
      err.style.display = 'block';
    }
  } catch (e) {
    err.textContent = '系統錯誤：' + e.message;
    err.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = '登入';
  }
}

['inp-user','inp-pw'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
});

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  const initials = currentUser.name ? currentUser.name.slice(0,1) : currentUser.username.slice(0,2).toUpperCase();
  document.getElementById('user-avatar').textContent = initials;
  document.getElementById('user-name-display').textContent = currentUser.name || currentUser.username;
  document.getElementById('user-account-display').textContent = '@' + currentUser.username;
  switchTab('notice');
  if (!noticeLoaded) loadNotice();
}

function switchTab(tab) {
  document.getElementById('tab-notice').style.display = tab === 'notice' ? 'block' : 'none';
  document.getElementById('tab-search').style.display = tab === 'search' ? 'block' : 'none';
  document.getElementById('t-notice').className = 'tab-btn' + (tab === 'notice' ? ' active' : '');
  document.getElementById('t-search').className = 'tab-btn' + (tab === 'search' ? ' active' : '');
}

async function loadNotice() {
  try {
    const data = await api({ action: 'notice' });
    noticeLoaded = true;
    if (data.error) { document.getElementById('notice-area').innerHTML = `<div class="notice-empty">載入失敗：${data.error}</div>`; return; }
    if (!data.notices || data.notices.length === 0) { document.getElementById('notice-area').innerHTML = `<div class="notice-empty">目前沒有公告</div>`; return; }
    let html = '';
    for (const n of data.notices) {
      html += `<div class="notice-card"><div class="notice-header"><div class="notice-dot"></div><div class="notice-title">${n.title || '（無標題）'}</div><div class="notice-date">${n.date || ''}</div></div><div class="notice-body">${n.content || ''}</div></div>`;
    }
    document.getElementById('notice-area').innerHTML = html;
  } catch(e) {
    document.getElementById('notice-area').innerHTML = `<div class="notice-empty">發生錯誤：${e.message}</div>`;
  }
}

function doLogout() {
  currentUser = null; noticeLoaded = false;
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('inp-user').value = '';
  document.getElementById('inp-pw').value = '';
  document.getElementById('err-box').style.display = 'none';
  document.getElementById('search-input').value = '';
  document.getElementById('results-area').innerHTML = '<div class="status-msg">輸入關鍵字後點擊搜尋</div>';
  document.getElementById('notice-area').innerHTML = '<div class="status-msg">載入公告中 <span class="dots"><span>．</span><span>．</span><span>．</span></span></div>';
}

document.getElementById('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  const btn = document.getElementById('btn-search');
  btn.disabled = true;
  document.getElementById('results-area').innerHTML = '<div class="status-msg">搜尋中 <span class="dots"><span>．</span><span>．</span><span>．</span></span></div>';
  try {
    const data = await api({ action: 'search', keyword: q });
    if (data.error) {
      document.getElementById('results-area').innerHTML = `<div class="status-msg">讀取失敗：${data.error}</div>`;
    } else if (!data.results || data.results.length === 0) {
      document.getElementById('results-area').innerHTML = `<div class="status-msg">找不到符合「${q}」的品項</div>`;
    } else {
      let html = `<div class="result-count">找到 ${data.results.length} 筆結果</div>`;
      for (const r of data.results) {
        const cost = typeof r.cost === 'number' ? r.cost.toLocaleString() : (r.cost || '—');
        html += `<div class="result-card"><div><div class="result-name">${r.name || '—'}</div><div class="result-id">${r.id || ''}</div></div><div class="result-cost">NT$&nbsp;${cost}</div></div>`;
      }
      document.getElementById('results-area').innerHTML = html;
    }
  } catch(e) {
    document.getElementById('results-area').innerHTML = `<div class="status-msg">發生錯誤：${e.message}</div>`;
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
